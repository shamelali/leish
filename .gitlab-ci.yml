# .gitlab-ci.yml
# LEISH.MY - Testing Pipeline (Vercel handles deployments)

stages:
  - test

variables:
  NODE_VERSION: "22"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

test:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - npm ci
  script:
    - npm run typecheck
    - npm run lint
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
